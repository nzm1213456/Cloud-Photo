<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的相册</title>
    <style>
        body{max-width:1000px;margin:20px auto;padding:0 20px;}
        .box{display:inline-block;margin:10px;border:1px solid #ddd;padding:10px;border-radius:8px;}
        img, video{width:200px;height:150px;object-fit:cover;}
        button{margin-top:8px;padding:6px 12px;background:#007aff;color:white;border:none;border-radius:6px;cursor:pointer;}
    </style>
</head>
<body>
    <h2>我的相册</h2>
    <br>

    <div id="media"></div>

    <script>
        // 改用jsDelivr CDN，国内稳定访问
        const privateBase = "https://cdn.jsdelivr.net/gh/nzm1213456/photos@main/images/";

        const mediaList = [
            "1.jpg"
        ];

        let html = "";
        mediaList.forEach(name => {
            let url = privateBase + name;
            let tag = "";

            if (name.match(/\.(mp4|webm|mov)$/i)) {
                tag = `<video controls muted><source src="${url}" type="video/mp4">加载失败</video>`;
            } else {
                tag = `<img src="${url}" alt="${name}">`;
            }
            
            html += `
            <div class="box">
                ${tag}
                <br>
                <button onclick="copy('${url}')">复制NFC链接</button>
            </div>
            `;
        });

        document.getElementById("media").innerHTML = html;

        // 修复：新版浏览器兼容的复制方法
        async function copy(url) {
            try {
                await navigator.clipboard.writeText(url);
                alert("已复制NFC可用链接");
            } catch (err) {
                alert("复制失败，请手动复制链接：" + url);
            }
        }
    </script>
</body>
</html>
