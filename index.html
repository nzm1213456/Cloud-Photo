<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的相册</title>
    <style>
        body{max-width:1000px;margin:20px auto;padding:0 20px;}
        .box{display:inline-block;margin:10px;border:1px solid #ddd;padding:10px;border-radius:8px;}
        img, video{width:200px;height:150px;object-fit:cover;}
        button{margin-top:8px;padding:6px 12px;background:#007aff;color:white;border:none;border-radius:6px;cursor:pointer;}
    </style>
</head>
<body>
    <h2>我的相册</h2>
    <br>

    <div id="media"></div>

    <script>
        // ==============================================
        // 仓库1：你原来的图片仓库（不动）
        // ==============================================
        const repo1 = {
            base: "https://raw.githubusercontent.com/nzm1213456/photos/main/images",
            token: "?token=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",
            files: [
                "1.jpg"  // 你原来的图片
            ]
        };

        // ==============================================
        // 仓库2：你新账号的视频仓库（刚刚那个）
        // ==============================================
        const repo2 = {
            base: "https://raw.githubusercontent.com/cangku-photo/tupian-shiping/main/shipin",
            token: "?token=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",
            files: [
                "VID_20230830_131114.mp4"  // 你要加的视频
            ]
        };

        // ==============================================
        // 自动合并加载（不用动）
        // ==============================================
        let allMedia = [];
        repo1.files.forEach(f => allMedia.push({ url: repo1.base + f + repo1.token, name: f }));
        repo2.files.forEach(f => allMedia.push({ url: repo2.base + f + repo2.token, name: f }));

        let html = "";
        allMedia.forEach(item => {
            let url = item.url;
            let name = item.name;
            let tag = "";

            if (name.match(/\.(mp4|webm|mov)$/i)) {
                tag = `<video controls muted><source src="${url}" type="video/mp4">加载失败</video>`;
            } else {
                tag = `<img src="${url}" alt="${name}">`;
            }

            html += `
            <div class="box">
                ${tag}
                <br>
                <button onclick="copy('${url}')">复制NFC链接</button>
            </div>
            `;
        });

        document.getElementById("media").innerHTML = html;

        // 复制链接
        function copy(url) {
            let i = document.createElement("input");
            i.value = url;
            document.body.appendChild(i);
            i.select();
            document.execCommand("copy");
            i.remove();
            alert("已复制NFC可用链接");
        }
    </script>
</body>
</html>
