<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的相册</title>
    <style>
        body{max-width:1000px;margin:20px auto;padding:0 20px;}
        .box{display:inline-block;margin:10px;border:1px solid #ddd;padding:10px;border-radius:8px;}
        img, video{width:200px;height:150px;object-fit:cover;}
        button{margin-top:8px;padding:6px 12px;background:#007aff;color:white;border:none;border-radius:6px;cursor:pointer;}
    </style>
</head>
<body>
    <h2>我的相册</h2>
    <br>

    <div id="media"></div>

    <script>
        // ====================== 仓库1（图片）======================
        const repo1 = {
            base: "https://raw.githubusercontent.com/nzm1213456/photos/main/images/",
            token: "?token=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",
            files: ["1.jpg"]
        };

        // ====================== 仓库2（视频）======================
        const repo2 = {
            base: "https://raw.githubusercontent.com/cangku-photo/tupian-shiping/main/shipin/",
            token: "?token=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",
            files: ["VID_20230830_131114.mp4"]
        };

        // 拼接路径（自动补全斜杠，修复 90% 加载失败）
        function getUrl(repo, name) {
            return repo.base.replace(/\/$/, '') + "/" + name + repo.token;
        }

        let allMedia = [];
        repo1.files.forEach(f => allMedia.push({ url: getUrl(repo1, f), name: f }));
        repo2.files.forEach(f => allMedia.push({ url: getUrl(repo2, f), name: f }));

        let html = "";
        allMedia.forEach(item => {
            let url = item.url;
            let name = item.name;
            let tag = "";

            if (name.match(/\.(mp4|webm|mov)$/i)) {
                tag = `<video controls muted playsinline><source src="${url}" type="video/mp4">视频加载失败</video>`;
            } else {
                tag = `<img src="${url}" alt="${name}" onerror="this.src='https://via.placeholder.com/200x150?text=图片失败'">`;
            }

            html += `
            <div class="box">
                ${tag}
                <br>
                <button onclick="copy('${url}')">复制NFC链接</button>
            </div>
            `;
        });

        document.getElementById("media").innerHTML = html;

        // 复制（新版浏览器兼容）
        async function copy(text) {
            try {
                await navigator.clipboard.writeText(text);
                alert("✅ 复制成功！");
            } catch (e) {
                let input = document.createElement("input");
                input.value = text;
                document.body.appendChild(input);
                input.select();
                document.execCommand("copy");
                input.remove();
                alert("✅ 复制成功！");
            }
        }
    </script>
</body>
</html>
