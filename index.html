<!DOCTYPE html>
<!-- 网页语言设置为中文 -->
<html lang="zh-CN">
<head>
    <!-- 字符编码，防止中文乱码 -->
    <meta charset="UTF-8">
    <!-- 适配手机端 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 网页标题（浏览器标签显示） -->
    <title>我的第一个HTML页面</title>
    <style>
        /* 简单样式美化页面 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", sans-serif;
        }
        body {
            background-color: #f5f5f5;
            line-height: 1.6;
        }
        /* 导航栏样式 */
        nav {
            background-color: #2c3e50;
            color: white;
            padding: 15px 20px;
        }
        /* 内容区域样式 */
        .container {
            max-width: 1000px;
            margin: 30px auto;
            padding: 20px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 20px;
        }
        p {
            font-size: 16px;
            color: #333;
            margin-bottom: 15px;
        }
        /* 底部样式 */
        footer {
            text-align: center;
            padding: 20px;
            background-color: #2c3e50;
            color: white;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav>
        简易HTML页面
    </nav>

    <!-- 主体内容 -->
    <div class="container">
        <h1>你好！这是我的第一个网页</h1>
        <p>这是一个用HTML+CSS编写的简单页面，结构清晰，适合新手学习和使用。</p>
        <p>你可以在这里添加文字、图片、链接、按钮等任何网页内容。</p>
        <p>学习HTML是制作网页的第一步！</p>
    </div>

    <!-- 底部 -->
    <footer>
        © 2025 我的简易网页
    </footer>
</body>
</html>
