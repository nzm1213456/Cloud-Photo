<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFC碰一碰照片</title>
    <style>
        body{max-width:1000px;margin:20px auto;padding:0 20px;}
        .box{display:inline-block;margin:10px;border:1px solid #ddd;padding:10px;border-radius:8px;}
        img{width:200px;height:150px;object-fit:cover;}
        button{margin-top:8px;padding:6px 12px;background:#007aff;color:white;border:none;border-radius:6px;cursor:pointer;}
    </style>
</head>
<body>
    <h2>我的NFC照片相册</h2>
    <br>

    <div id="imgs"></div>

    <script>
        // ======================================
        // 只需要在这里写你上传的图片文件名
        // ======================================
        const images = [
            "1.jpg",
            // 想加更多直接往下写，例如：
            // "2.jpg",
            // "3.png"
        ];

        let html = "";
        images.forEach(name => {
            // 绝对路径，保证能显示
            let url = "https://nzm1213456.github.io/Cloud-Photo/images/" + name;
            
            html += `
            <div class="box">
                <img src="${url}">
                <br>
                <button onclick="copy('${url}')">复制NFC链接</button>
            </div>
            `;
        });

        document.getElementById("imgs").innerHTML = html;

        // 复制链接
        function copy(url) {
            let i = document.createElement("input");
            i.value = url;
            document.body.appendChild(i);
            i.select();
            document.execCommand("copy");
            i.remove();
            alert("已复制：" + url);
        }
    </script>
</body>
</html>
